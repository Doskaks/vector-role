---
driver:
  name: docker

platforms:
  - name: ubuntu-22-04
    image: geerlingguy/docker-ubuntu2204-ansible:latest
    pre_build_image: true
    privileged: true

provisioner:
  name: ansible
  playbooks:
    converge: ../default/converge.yml
    verify: ../default/verify.yml

verifier:
  name: ansible

scenario:
  name: docker
  test_sequence:
    - destroy
    - create
    - converge
    - verify
    - destroy
