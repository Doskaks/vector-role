---
- name: Prepare
  hosts: all
  gather_facts: false
  tasks:
    - name: Update apt cache
      raw: apt-get update -y
      changed_when: false
      
    - name: Install Python and systemd
      raw: apt-get install -y python3 python3-apt systemd
      changed_when: false
      
    - name: Gather facts
      setup:
      when: false
